<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game App</title>
    <style>
        body {
            background-color: #1a1a2e;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #game-wrapper {
            text-align: center;
            padding: 20px;
            background: #16213e;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
        }
        canvas {
            display: block;
            background-color: #000;
            border: 3px solid #4ecca3;
            margin: 10px auto;
        }
        .stats-bar {
            display: flex;
            justify-content: space-around;
            font-size: 1.2rem;
            font-weight: bold;
            color: #4ecca3;
            margin-bottom: 10px;
        }
        .btn-container { margin-top: 15px; }
        button, .home-link {
            padding: 12px 25px;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            transition: transform 0.2s, background 0.3s;
            margin: 0 5px;
            display: inline-block;
            text-decoration: none;
        }
        .start-btn { background-color: #4ecca3; color: #1a1a2e; }
        .home-link { background-color: #e94560; color: white; }
        
        /* Game Over Overlay Styles */
        #game-over-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: none;
            flex-direction: column;
            align-items: center;
            background: rgba(22, 33, 62, 0.9);
            padding: 20px;
            border-radius: 15px;
            border: 2px solid #e94560;
        }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <h2>Neon Rainbow Snake</h2>
        <div class="stats-bar">
            <div id="score">Score: 0</div>
            <div id="highScore">High Score: 0</div>
        </div>

        <div style="position: relative;">
            <canvas id="snakeGame" width="400" height="400"></canvas>
            
            <div id="game-over-overlay">
                <h1 style="color: #e94560; margin: 0 0 10px 0;">GAME OVER</h1>
                <p id="final-score-text" style="font-size: 1.2rem; margin-bottom: 20px;"></p>
                <button class="start-btn" onclick="startGame()">Try Again</button>
            </div>
        </div>

        <div class="btn-container">
            <button id="main-start-btn" class="start-btn" onclick="startGame()">Start Game</button>
            <a href="index.html" class="home-link">Return to Home</a>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("snakeGame");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const highElement = document.getElementById("highScore");
        const overlay = document.getElementById("game-over-overlay");
        const finalScoreText = document.getElementById("final-score-text");
        const mainStartBtn = document.getElementById("main-start-btn");

        const box = 20;
        let snake, food, d, nextD, score, game, currentSpeed, isPlaying;
        
        let highScore = localStorage.getItem("snakeHighScore") || 0;
        highElement.innerHTML = "High Score: " + highScore;

        const neonColors = ["#FF00FF", "#00FFFF", "#00FF00", "#FFFF00", "#FF0000", "#FF8C00", "#7FFF00"];

        function init() {
            snake = [{ x: 10 * box, y: 10 * box, color: "#4ecca3" }];
            generateFood();
            score = 0;
            d = "RIGHT";
            nextD = "RIGHT";
            currentSpeed = 180; // Slightly slower starting speed (180ms)
            isPlaying = true;
            scoreElement.innerHTML = "Score: " + score;
            overlay.style.display = "none";
            mainStartBtn.style.visibility = "hidden"; // Hide main button while playing
        }

        function generateFood() {
            let valid = false;
            while (!valid) {
                let newX = Math.floor(Math.random() * (canvas.width / box)) * box;
                let newY = Math.floor(Math.random() * (canvas.height / box)) * box;

                const isTopLeft = (newX === 0 && newY === 0);
                const isTopRight = (newX === canvas.width - box && newY === 0);
                const isBottomLeft = (newX === 0 && newY === canvas.height - box);
                const isBottomRight = (newX === canvas.width - box && newY === canvas.height - box);

                if (!isTopLeft && !isTopRight && !isBottomLeft && !isBottomRight) {
                    food = { x: newX, y: newY };
                    valid = true;
                }
            }
        }

        document.addEventListener("keydown", (e) => {
            const key = e.keyCode;
            if(key == 37 && d != "RIGHT") nextD = "LEFT";
            else if(key == 38 && d != "DOWN") nextD = "UP";
            else if(key == 39 && d != "LEFT") nextD = "RIGHT";
            else if(key == 40 && d != "UP") nextD = "DOWN";
            if([37, 38, 39, 40].includes(key)) e.preventDefault();
        });

        function gameLoop() {
            if (!isPlaying) return;
            draw();
            game = setTimeout(gameLoop, currentSpeed);
        }

        function draw() {
            d = nextD;
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // DRAW APPLE
            const centerX = food.x + box / 2;
            const centerY = food.y + box / 2;
            const radius = box / 2 - 2;
            ctx.fillStyle = "#e94560";
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
            ctx.fill();
            ctx.fillStyle = "#8b4513";
            ctx.fillRect(centerX - 1, centerY - radius - 2, 2, 5);
            ctx.fillStyle = "#2ecc71";
            ctx.beginPath();
            ctx.ellipse(centerX + 3, centerY - radius - 2, 2, 4, Math.PI / 4, 0, 2 * Math.PI);
            ctx.fill();

            // DRAW SNAKE
            snake.forEach((segment, i) => {
                ctx.fillStyle = segment.color;
                if (i === 0) {
                    ctx.beginPath();
                    ctx.moveTo(segment.x + box / 2, segment.y);
                    ctx.lineTo(segment.x + box, segment.y + box / 2);
                    ctx.lineTo(segment.x + box / 2, segment.y + box);
                    ctx.lineTo(segment.x, segment.y + box / 2);
                    ctx.closePath();
                    ctx.fill();
                    ctx.fillStyle = "white";
                    ctx.fillRect(segment.x + 4, segment.y + 6, 3, 3);
                    ctx.fillRect(segment.x + 13, segment.y + 6, 3, 3);
                    ctx.fillStyle = "black";
                    ctx.fillRect(segment.x + 5, segment.y + 7, 1, 1);
                    ctx.fillRect(segment.x + 14, segment.y + 7, 1, 1);
                } else {
                    ctx.fillRect(segment.x + 1, segment.y + 1, box - 2, box - 2);
                }
            });

            let headX = snake[0].x;
            let headY = snake[0].y;

            if (d === "LEFT") headX -= box;
            if (d === "UP") headY -= box;
            if (d === "RIGHT") headX += box;
            if (d === "DOWN") headY += box;

            // COLLISION
            if (headX < 0 || headX >= canvas.width || headY < 0 || headY >= canvas.height || 
                snake.some(seg => seg.x === headX && seg.y === headY)) {
                
                isPlaying = false;
                clearTimeout(game);
                
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem("snakeHighScore", highScore);
                    highElement.innerHTML = "High Score: " + highScore;
                }
                
                // Clear board and show Game Over UI
                ctx.fillStyle = "black";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                finalScoreText.innerText = "Final Score: " + score;
                overlay.style.display = "flex";
                return;
            }

            const newHead = { x: headX, y: headY, color: snake[0].color };

            if (headX === food.x && headY === food.y) {
                score++;
                scoreElement.innerHTML = "Score: " + score;
                newHead.color = neonColors[Math.floor(Math.random() * neonColors.length)];
                if (currentSpeed > 60) currentSpeed -= 4; // Progress speed
                generateFood();
            } else {
                snake.pop();
            }

            snake.unshift(newHead);
        }

        function startGame() {
            clearTimeout(game);
            init();
            gameLoop();
        }
        
        // Setup initial view
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    </script>
</body>
</html>
